<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PĒÑDØ Academy - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f9ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#0056b3;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#0056b3;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#003d80;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#0056b3;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="container">

<h1>PĒÑDØ Academy</h1>

<form id="loginForm">

<input type="email" id="email" placeholder="Email Address" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit",function(e){
e.preventDefault();

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(email==="admin@pendo.com" && password==="123456"){
alert("Login Successful!");
window.location.href="dashboard.html";
}else{
alert("Invalid Email or Password");
}
});
</script>

</body>
</html>
